name: Deploy Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build infra
        working-directory: infra
        run: npx tsc

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get CloudFront domain
        id: hosting
        run: |
          DOMAIN=$(aws cloudformation describe-stacks --stack-name AbleTracker-Hosting \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue" --output text 2>/dev/null || echo "")
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"

      - name: CDK diff
        working-directory: infra
        run: |
          ORIGINS=""
          if [ -n "${{ steps.hosting.outputs.domain }}" ]; then
            ORIGINS="https://${{ steps.hosting.outputs.domain }}"
          fi
          npx cdk diff --all ${ORIGINS:+-c allowedOrigins=$ORIGINS}

      - name: CDK deploy
        working-directory: infra
        run: |
          ORIGINS=""
          if [ -n "${{ steps.hosting.outputs.domain }}" ]; then
            ORIGINS="https://${{ steps.hosting.outputs.domain }}"
          fi
          npx cdk deploy --all --require-approval never ${ORIGINS:+-c allowedOrigins=$ORIGINS}
